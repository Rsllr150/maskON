# GitHub Actions workflow: run the test suite on every push and pull request.
name: CI

# When does this run? On any push, and on any pull request.
on:
  push:
  pull_request:

jobs:
  test:
    # The virtual machine GitHub spins up for us, fresh every time.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      # 1. Check out the repository code onto the machine.
      - uses: actions/checkout@v4

      # 2. Install Python — tested on each version of the matrix.
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # 3. Install the project's dependencies (runtime + dev tools).
      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # 4. Lint: catch bugs and style issues.
      - name: Lint (ruff)
        run: ruff check maskon tests scripts

      # 5. Format: fail if the code isn't formatted.
      - name: Format check (ruff)
        run: ruff format --check maskon tests scripts

      # 6. Types: strict static type checking.
      - name: Type check (mypy)
        run: mypy maskon tests scripts

      # 7. Tests + coverage: the suite must stay green and coverage must stay
      #    above the threshold set in pyproject.toml ([tool.coverage.report]).
      - name: Run tests
        run: pytest --cov=maskon --cov-report=term-missing
